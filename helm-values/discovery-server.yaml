nameOverride: discovery-server

image:
  tag: "e5ae608"
  pullPolicy: IfNotPresent

service:
  port: 8761
  targetPort: 8761

ingress:
  enabled: true
  className: alb
  hosts:
    - eureka.phoniex.site
    - discovery.phoniex.site
  listenPorts:
    - HTTP: 80
    - HTTPS: 443
  sslRedirect: "443"

env:
  SPRING_PROFILES_ACTIVE: docker
  CONFIG_SERVER_URL: http://config-server:8888/

extraInitContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        until wget -q -T 2 -O- http://config-server:8888 >/dev/null 2>&1; do
          echo "waiting for config-server"
          sleep 5
        done

pdb:
  enabled: true